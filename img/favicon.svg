<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#4facfe" stop-opacity="1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect x="2" y="2" width="28" height="28" rx="6" fill="#4facfe" filter="url(#shadow)" />
  <rect x="2" y="2" width="28" height="28" rx="6" fill="url(#grad)" />
  <text x="50%" y="50%" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#ffffff" dominant-baseline="central" text-anchor="middle">Y</text>
</svg>
